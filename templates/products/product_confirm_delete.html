{% extends 'base.html' %}
{% block title %}Delete {{ product.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h4 class="fw-bold">Delete Product?</h4>
      <p class="text-muted">Are you sure you want to delete <strong>{{ product.name }}</strong>? This cannot be undone.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'products:detail' product.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
